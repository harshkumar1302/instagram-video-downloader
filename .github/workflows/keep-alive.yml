name: Keep Render App Alive

on:
  schedule:
    # Runs every 14 minutes
    - cron: "*/14 * * * *"
  workflow_dispatch: # Allows manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render Backend
        run: |
          curl -sS https://instagram-video-downloader-rpn7.onrender.com/api/health > /dev/null
          echo "Pinged Render instance successfully."
